		<script>
    // ===== FUNCIONES DEL MODAL DE GALERÍA =====
    let indiceImagenActual = 0;
    let imagenes = [];

    function abrirModal(elemento) {
        const modal = document.getElementById('modalGaleria');
        const imagenModal = document.getElementById('imagenModal');
        imagenes = document.querySelectorAll('.foto-galeria');
        
        // Encontrar el índice de la imagen actual
        imagenes.forEach((img, index) => {
            if (img === elemento) {
                indiceImagenActual = index;
            }
        });
        
        imagenModal.src = elemento.src;
        modal.classList.add('mostrar');
    }

    function cerrarModal() {
        const modal = document.getElementById('modalGaleria');
        modal.classList.remove('mostrar');
    }

    function imagenAnterior() {
        indiceImagenActual--;
        if (indiceImagenActual < 0) {
            indiceImagenActual = imagenes.length - 1;
        }
        document.getElementById('imagenModal').src = imagenes[indiceImagenActual].src;
    }

    function imagenSiguiente() {
        indiceImagenActual++;
        if (indiceImagenActual >= imagenes.length) {
            indiceImagenActual = 0;
        }
        document.getElementById('imagenModal').src = imagenes[indiceImagenActual].src;
    }

    // Cerrar modal al hacer clic fuera de la imagen
    document.addEventListener('click', function(event) {
        const modal = document.getElementById('modalGaleria');
        if (event.target === modal) {
            cerrarModal();
        }
    });

    // Navegación con teclado
    document.addEventListener('keydown', function(event) {
        const modal = document.getElementById('modalGaleria');
        if (modal.classList.contains('mostrar')) {
            if (event.key === 'ArrowLeft') {
                imagenAnterior();
            } else if (event.key === 'ArrowRight') {
                imagenSiguiente();
            } else if (event.key === 'Escape') {
                cerrarModal();
            }
        }
    });

    // Efecto de aparición al hacer scroll
    const observarElementos = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.style.opacity = "1";
                entry.target.style.transform = "translateY(0)";
            }
        });
    }, { threshold: 0.1 });

    // Aplicar a todas las tarjetas
    document.querySelectorAll('.tarjeta-clase-pro, .tarjeta-docente, .tarjeta-cristal').forEach(tarjeta => {
        tarjeta.style.opacity = "0";
        tarjeta.style.transform = "translateY(30px)";
        tarjeta.style.transition = "all 0.6s ease-out";
        observarElementos.observe(tarjeta);
    });
</script>
